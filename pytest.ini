[pytest]
addopts = --cov=. --cov-report=term
norecursedirs = funktional

markers =
    office: real-Office COM round-trip (needs Word/Excel/PowerPoint installed).
        Runs in the DEFAULT suite; auto-skips on non-Windows / where the app
        isn't installed. Opt out of just these with `pytest -m "not office"`.

filterwarnings =
    ignore:.*SwigPyPacked has no __module__.*:DeprecationWarning
    ignore:.*SwigPyObject has no __module__.*:DeprecationWarning
    ignore:.*swigvarlink has no __module__.*:DeprecationWarning

[coverage:run]
omit =
    funktional/*
    tests/test_alt_*.py
